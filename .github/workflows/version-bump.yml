name: Auto Version Bump

on:
  pull_request:
    types: [opened, edited]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect bump type from PR body
        id: detect
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -q '^\- \[x\] `patch`'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q '^\- \[x\] `minor`'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$PR_BODY" | grep -q '^\- \[x\] `major`'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Bump VERSION
        if: steps.detect.outputs.bump != 'none'
        env:
          BUMP: ${{ steps.detect.outputs.bump }}
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          # Strip any suffix like -SNAPSHOT
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          # Preserve suffix if present (e.g. -SNAPSHOT)
          SUFFIX=$(echo "$CURRENT" | grep -o '\-.*' || true)
          echo "${NEW_VERSION}${SUFFIX}" > VERSION
          echo "Bumped $CURRENT → ${NEW_VERSION}${SUFFIX}"

      - name: Commit updated VERSION
        if: steps.detect.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump version to $(cat VERSION) [auto]"
          git push
